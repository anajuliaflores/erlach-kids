<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#c8102e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Erlach Kids">
<title>Erlach Kids – Controle Financeiro</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#c8102e;
  --red-dark:#9b0c22;
  --red-light:#e8354f;
  --red-bg:#fff0f2;
  --red-border:#f5c0c8;
  --gold:#f5a623;
  --gold-bg:#fff8ee;
  --bg:#f7f7f8;
  --surface:#ffffff;
  --surface2:#f2f2f4;
  --success:#1a7a4a;
  --success-bg:#e6f4ed;
  --text:#1a1a1a;
  --text2:#555;
  --text3:#999;
  --border:#e4e4e8;
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 2px 14px rgba(0,0,0,0.07);
  --shadow-md:0 4px 24px rgba(0,0,0,0.11);
  --font:'Nunito',sans-serif;
  --mono:monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#login-screen{background:linear-gradient(150deg,var(--red-dark) 0%,var(--red) 60%,var(--red-light) 100%);align-items:center;justify-content:center;padding:2rem}
.login-box{background:#fff;border-radius:22px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 12px 48px rgba(0,0,0,0.2)}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo-icon{width:68px;height:68px;background:var(--red);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;box-shadow:0 6px 18px rgba(200,16,46,0.35)}
.login-logo-icon span{font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:-1px}
.login-logo h1{font-size:1.45rem;font-weight:800;color:var(--red);letter-spacing:-0.02em}
.login-logo p{font-size:0.75rem;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.09em}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:0.72rem;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.07em}
.form-group input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.78rem 1rem;font-size:0.95rem;font-family:var(--font);color:var(--text);background:var(--bg);transition:border-color 0.2s}
.form-group input:focus{outline:none;border-color:var(--red);background:#fff}
.btn-primary{width:100%;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:0.88rem;font-size:1rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:background 0.2s,transform 0.1s;box-shadow:0 4px 14px rgba(200,16,46,0.3)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:hover{background:var(--red-dark)}
.login-error{background:var(--red-bg);color:var(--red);border-radius:var(--radius-sm);padding:0.6rem 0.9rem;font-size:0.85rem;margin-bottom:1rem;display:none;font-weight:600}

/* APP SHELL */
#app-screen{background:var(--bg)}
.topbar{background:linear-gradient(135deg,var(--red-dark) 0%,var(--red) 70%,var(--red-light) 100%);padding:1rem 1.25rem 0.85rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-icon{width:36px;height:36px;background:rgba(255,255,255,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;color:#fff;border:1.5px solid rgba(255,255,255,0.25)}
.topbar-title h2{font-size:0.98rem;font-weight:700;color:#fff}
.topbar-title p{font-size:0.68rem;color:rgba(255,255,255,0.62);text-transform:uppercase;letter-spacing:0.07em}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:700;color:#fff;cursor:pointer}

/* NAV TABS */
.nav-tabs{display:flex;background:var(--red-dark);padding:0 1rem;gap:2px}
.nav-tab{flex:1;text-align:center;padding:0.65rem 0.3rem;font-size:0.68rem;font-weight:700;color:rgba(255,255,255,0.48);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.05em}
.nav-tab.active{color:#fff;border-bottom-color:#fff}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:1.1rem;display:flex;flex-direction:column;gap:1rem}

/* MONTH HEADER */
.month-tag{font-size:0.7rem;font-weight:700;color:var(--red);background:var(--red-bg);padding:4px 12px;border-radius:20px;border:1px solid var(--red-border);text-transform:uppercase;letter-spacing:0.06em;display:inline-block}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:1rem 1.1rem;box-shadow:var(--shadow);border-top:3px solid var(--border)}
.stat-card.sc-red{border-top-color:var(--red)}
.stat-card.sc-green{border-top-color:var(--success)}
.stat-card.sc-gold{border-top-color:var(--gold)}
.stat-card .s-label{font-size:0.66rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px}
.stat-card .s-value{font-size:1.75rem;font-weight:800;letter-spacing:-0.03em;line-height:1}
.stat-card .s-sub{font-size:0.7rem;color:var(--text3);margin-top:3px}
.stat-card.sc-red .s-value{color:var(--red)}
.stat-card.sc-green .s-value{color:var(--success)}
.stat-card.sc-gold .s-value{color:var(--gold)}

/* DEVE ENTRAR */
.deve-entrar-card{background:var(--surface);border-radius:var(--radius);padding:1.1rem 1.25rem;box-shadow:var(--shadow);border-left:4px solid var(--gold)}
.de-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.de-top span{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3)}
.btn-edit-saldo{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);border-radius:6px;padding:3px 10px;font-size:0.7rem;font-weight:700;cursor:pointer;font-family:var(--font)}
.de-valor{font-size:1.55rem;font-weight:800;color:var(--gold);letter-spacing:-0.02em}
.de-sub{font-size:0.72rem;color:var(--text3);margin-top:2px}
.saldo-edit-row{display:none;gap:8px;margin-top:10px}
.saldo-edit-row input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.55rem 0.8rem;font-size:0.92rem;font-family:var(--font)}
.saldo-edit-row input:focus{outline:none;border-color:var(--red)}
.btn-salvar-saldo{background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:0.55rem 1rem;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:var(--font)}

/* CHART */
.chart-card{background:var(--surface);border-radius:var(--radius);padding:1.1rem 1.25rem;box-shadow:var(--shadow)}
.chart-card h3{font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.9rem}
.chart-wrap{position:relative;display:flex;align-items:center;justify-content:center;height:190px}
.chart-center{position:absolute;text-align:center;pointer-events:none}
.chart-center .pct{font-size:1.6rem;font-weight:800;color:var(--text)}
.chart-center .lbl{font-size:0.65rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.chart-legend{display:flex;gap:1.25rem;justify-content:center;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:0.76rem;font-weight:600;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* LIST CARDS */
.list-card{background:var(--surface);border-radius:var(--radius);padding:1.1rem 1.25rem;box-shadow:var(--shadow)}
.list-card-title{font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.85rem;display:flex;align-items:center;gap:7px}
.bc{background:var(--red-bg);color:var(--red);border-radius:20px;padding:1px 8px;font-size:0.66rem;font-weight:700}
.bc.green{background:var(--success-bg);color:var(--success)}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.s-row:last-child{border-bottom:none}
.s-row:active{background:var(--bg)}
.s-name{font-size:0.88rem;font-weight:600;color:var(--text);line-height:1.3}
.s-mat{font-size:0.68rem;color:var(--text3);font-family:var(--mono);margin-top:1px}
.s-apagar{font-size:0.88rem;font-weight:700;color:var(--red)}
.s-venc{font-size:0.66rem;color:var(--text3);margin-top:2px;text-align:right}
.badge-ok{font-size:0.7rem;font-weight:700;color:var(--success);background:var(--success-bg);padding:2px 9px;border-radius:20px}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{flex:1;min-width:100px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.62rem 0.9rem;font-size:0.88rem;font-family:var(--font);color:var(--text);background:var(--surface)}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--red)}

/* STUDENT CARDS (aba alunos) */
.student-list{display:flex;flex-direction:column;gap:8px}
.student-card{background:var(--surface);border-radius:var(--radius);padding:1rem 1.1rem;box-shadow:var(--shadow);cursor:pointer;border-left:3px solid var(--border);transition:transform 0.15s}
.student-card:active{transform:scale(0.99)}
.student-card.devendo{border-left-color:var(--red)}
.student-card.em-dia{border-left-color:var(--success)}
.student-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.student-name{font-size:0.93rem;font-weight:600;color:var(--text)}
.student-matricula{font-size:0.7rem;font-family:var(--mono);color:var(--text3);margin-top:2px}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:0.68rem;font-weight:700;flex-shrink:0}
.badge.devendo{background:var(--red-bg);color:var(--red)}
.badge.em-dia{background:var(--success-bg);color:var(--success)}
.student-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.student-info-sm{font-size:0.76rem;color:var(--text3)}
.student-apagar-val{font-size:0.95rem;font-weight:700;color:var(--red);font-family:var(--mono)}

/* DETAIL */
#detail-screen{background:var(--bg)}
.detail-header{background:linear-gradient(135deg,var(--red-dark),var(--red));padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.btn-back{background:transparent;border:none;cursor:pointer;color:#fff;padding:4px;display:flex;align-items:center}
.btn-back svg{width:22px;height:22px}
.detail-header-info h2{font-size:1rem;font-weight:700;color:#fff}
.detail-header-info p{font-size:0.73rem;color:rgba(255,255,255,0.6)}
.detail-content{padding:1.1rem;display:flex;flex-direction:column;gap:1rem}
.info-card{background:var(--surface);border-radius:var(--radius);padding:1.1rem;box-shadow:var(--shadow)}
.info-card h3{font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.9rem}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:0.82rem;color:var(--text2)}
.info-value{font-size:0.88rem;font-weight:600;color:var(--text);text-align:right}
.info-value.highlight{font-size:1.05rem;color:var(--red);font-family:var(--mono)}
.info-value.devendo{color:var(--red)}
.info-value.em-dia{color:var(--success)}

/* WhatsApp */
.btn-whatsapp{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#25d366;color:#fff;border:none;border-radius:var(--radius-sm);padding:0.88rem;font-size:0.95rem;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:none}
.btn-whatsapp svg{width:20px;height:20px;fill:#fff}

/* Notas */
.notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.note-item{background:var(--surface2);border-radius:var(--radius-sm);padding:0.8rem}
.note-meta{font-size:0.68rem;color:var(--text3);margin-bottom:4px;display:flex;gap:8px}
.note-meta strong{color:var(--red)}
.note-text{font-size:0.87rem;color:var(--text);line-height:1.5}
.notes-empty{font-size:0.85rem;color:var(--text3);text-align:center;padding:1rem 0}
.note-input-row{display:flex;gap:8px}
.note-input-row textarea{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem 0.85rem;font-size:0.87rem;font-family:var(--font);color:var(--text);resize:none;min-height:68px;background:var(--surface)}
.note-input-row textarea:focus{outline:none;border-color:var(--red)}
.btn-add-note{background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:0 1rem;font-size:0.85rem;font-family:var(--font);cursor:pointer;align-self:flex-end;height:68px;min-width:64px;font-weight:700}

/* ADMIN */
.upload-section{background:var(--surface);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.upload-section h3{font-size:0.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.85rem}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s}
.upload-area:hover{border-color:var(--red);background:var(--red-bg)}
.upload-area p{font-size:0.83rem;color:var(--text3);margin-top:6px}
.upload-area.has-file{border-color:var(--success);background:var(--success-bg)}
.upload-area.has-file p{color:var(--success)}
.btn-upload{margin-top:10px;width:100%;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:0.75rem;font-size:0.9rem;font-family:var(--font);cursor:pointer;font-weight:700}
.btn-upload:disabled{background:var(--text3);cursor:not-allowed}
.upload-status{margin-top:8px;font-size:0.82rem;padding:0.5rem 0.75rem;border-radius:var(--radius-sm);display:none;font-weight:600}
.upload-status.ok{background:var(--success-bg);color:var(--success);display:block}
.upload-status.err{background:var(--red-bg);color:var(--red);display:block}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);padding:1.5rem;width:100%;max-width:360px;box-shadow:var(--shadow-md)}
.modal h3{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:1.25rem}
.modal .form-group{margin-bottom:1rem}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.btn-cancel{flex:1;background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.72rem;font-size:0.9rem;font-family:var(--font);cursor:pointer;font-weight:600}
.btn-confirm{flex:1;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:0.72rem;font-size:0.9rem;font-family:var(--font);cursor:pointer;font-weight:700}

/* PERFIL */
.logout-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem 0.9rem;font-size:0.85rem;font-family:var(--font);color:var(--text2);cursor:pointer;margin-top:1rem;width:100%;justify-content:center;font-weight:600}
.logout-btn:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.change-pwd-banner{background:var(--gold-bg);border:1px solid #ffd080;border-radius:var(--radius-sm);padding:0.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.change-pwd-banner p{font-size:0.82rem;color:var(--gold)}
.btn-change-pwd{background:var(--gold);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:0.78rem;font-family:var(--font);cursor:pointer;font-weight:700;white-space:nowrap}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:0.9rem}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><span>EK</span></div>
      <h1>Erlach Kids</h1>
      <p>Itaparica · Controle Financeiro</p>
    </div>
    <div id="login-error" class="login-error">Usuário ou senha incorretos.</div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="login-user" placeholder="seu.usuario" autocomplete="username" autocapitalize="none">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-icon">EK</div>
      <div class="topbar-title">
        <h2>Erlach Kids</h2>
        <p id="topbar-role">Carregando...</p>
      </div>
    </div>
    <div class="avatar" id="user-avatar" onclick="showTab('perfil')">?</div>
  </div>
  <div class="nav-tabs" id="nav-tabs">
    <div class="nav-tab active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="nav-tab" onclick="showTab('alunos')">Alunos</div>
    <div class="nav-tab admin-only" onclick="showTab('admin')" style="display:none">Admin</div>
    <div class="nav-tab" onclick="showTab('perfil')">Perfil</div>
  </div>
  <div class="content" id="main-content"></div>
</div>

<!-- DETAIL -->
<div id="detail-screen" class="screen">
  <div class="detail-header">
    <button class="btn-back" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="detail-header-info">
      <h2 id="detail-name">—</h2>
      <p id="detail-matricula">—</p>
    </div>
  </div>
  <div class="detail-content" id="detail-content"></div>
</div>

<!-- MODAL SENHA -->
<div class="modal-overlay" id="modal-pwd">
  <div class="modal">
    <h3>Trocar senha</h3>
    <div class="form-group"><label>Nova senha</label><input type="password" id="new-pwd1" placeholder="Nova senha"></div>
    <div class="form-group"><label>Confirmar</label><input type="password" id="new-pwd2" placeholder="Confirmar senha"></div>
    <div id="pwd-error" class="login-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="saveNewPassword()">Salvar</button>
    </div>
  </div>
</div>

let searchQuery = '';
let activeFilter = 'todos';
let deveEntrar = 0;
let pizzaChart = null;

// ============================================================
// AUTH
// ============================================================
async function doLogin(){
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const err  = document.getElementById('login-error');
  const btn  = document.querySelector('#login-screen .btn-primary');
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  try {
    const {data,error} = await sb.from('usuarios').select('*').eq('username',user).eq('password',pass).single();
    if(error||!data){
      err.style.display='block';
      err.textContent='Usuário ou senha incorretos.';
    } else {
      currentUser={username:data.username,role:data.role,displayName:data.display_name,mustChange:data.must_change};
      err.style.display='none';
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('app-screen').classList.add('active');
      initApp();
    }
  } catch(e){
    err.style.display='block';
    err.textContent='Erro de conexão. Tente novamente.';
  }
  btn.textContent='Entrar';
  btn.disabled=false;
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('login-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pass').focus();});

async function initApp(){
  document.getElementById('user-avatar').textContent=currentUser.displayName[0].toUpperCase();
  document.getElementById('topbar-role').textContent=roleLabel(currentUser.role);
  if(currentUser.role==='admin') document.querySelector('.admin-only').style.display='';
  // Show loading
  document.getElementById('main-content').innerHTML='<div class="empty-state"><p>Carregando dados...</p></div>';
  document.getElementById('app-screen').classList.add('active');
  // Load all data from DB in parallel
  try{
    const [cfgRes, alunosRes, devedoresRes] = await Promise.all([
      sb.from('configuracoes').select('valor').eq('chave','deve_entrar').single(),
      sb.from('alunos').select('*').eq('tipo','base').order('nome'),
      sb.from('devedores_mes').select('*').order('created_at',{ascending:false}).limit(1000)
    ]);
    if(cfgRes.data) deveEntrar=parseFloat(cfgRes.data.valor)||0;
    if(alunosRes.data && alunosRes.data.length){
      estudantesBase=alunosRes.data.map(r=>({
        matricula:r.matricula,nome:r.nome,curso:r.curso||'',
        periodo:r.periodo||'',turma:r.turma||'',parcela:r.parcela||'',
        limite:r.limite||'',valor:r.valor||0,desc:r.desc_val||0,
        acresc:r.acresc||0,apagar:r.apagar||0
      }));
    }
    if(devedoresRes.data && devedoresRes.data.length){
      // Get latest mes_referencia
      const latestMes=devedoresRes.data[0].mes_referencia;
      if(latestMes) mesReferencia=latestMes;
      // Get devedores for that month
      const mesData=devedoresRes.data.filter(d=>d.mes_referencia===latestMes);
      devedores=[...new Set(mesData.map(d=>d.matricula))];
    }
  }catch(e){console.error('Error loading data:',e);}
  showTab('dashboard');
}
function roleLabel(r){return r==='admin'?'Administrador':'Gestão';}
function doLogout(){
  currentUser=null;
  if(pizzaChart){pizzaChart.destroy();pizzaChart=null;}
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}

// ============================================================
// TABS
// ============================================================
function showTab(tab){
  document.querySelectorAll('.nav-tab').forEach(t=>{
    const map={'Dashboard':'dashboard','Alunos':'alunos','Admin':'admin','Perfil':'perfil'};
    t.classList.toggle('active',map[t.textContent]===tab);
  });
  if(pizzaChart&&tab!=='dashboard'){pizzaChart.destroy();pizzaChart=null;}
  const c=document.getElementById('main-content');
  if(tab==='dashboard')     c.innerHTML=renderDashboard();
  else if(tab==='alunos')   c.innerHTML=renderAlunos();
  else if(tab==='admin')    c.innerHTML=renderAdmin();
  else if(tab==='perfil')   c.innerHTML=renderPerfil();
  if(tab==='dashboard') initChart();
}

function renderDashboard(){
  if(estudantesBase.length===0){
    return `<div class="empty-state" style="padding:3rem 1rem">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M9 17H7A5 5 0 0 1 7 7h2M15 7h2a5 5 0 0 1 0 10h-2M11 12h2"/></svg>
      <p style="margin-top:1rem;font-size:1rem;font-weight:600;color:var(--text2)">Nenhum dado carregado</p>
      <p style="margin-top:6px;font-size:0.85rem;color:var(--text3)">Acesse a aba <strong>Admin</strong> e faça o upload<br>do Relatório Base e do Relatório Mensal.</p>
    </div>`;
  }
  const total=estudantesBase.length;
  const nDev=devedores.length;
  const nOk=total-nDev;
  const pct=total?Math.round((nOk/total)*100):0;
  const isAdmin=currentUser.role==='admin';

  const mesDisplay = mesReferencia || (() => {
    const now=new Date();
    const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    return `${meses[now.getMonth()]} / ${now.getFullYear()}`;
  })();
  let h=`<span class="month-tag">${mesDisplay}</span>`;

  h+=`<div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr">
    <div class="stat-card sc-red"><div class="s-label">Em aberto</div><div class="s-value">${nDev}</div><div class="s-sub">alunos</div></div>
    <div class="stat-card sc-green"><div class="s-label">Em dia</div><div class="s-value">${nOk}</div><div class="s-sub">alunos</div></div>
    <div class="stat-card sc-green"><div class="s-label">Adimplência</div><div class="s-value">${pct}%</div><div class="s-sub">pagaram</div></div>
  </div>`;

  // Deve Entrar — visível para ambos, editável só admin
  const deVal=deveEntrar>0?`R$ ${fmt(deveEntrar)}`:'Não definido';
  h+=`<div class="deve-entrar-card">
    <div class="de-top">
      <span>Deve Entrar (mês)</span>
      ${isAdmin?`<button class="btn-edit-saldo" onclick="toggleEditSaldo()">✏ Editar</button>`:''}
    </div>
    <div class="de-valor" id="saldo-display">${deVal}</div>
    <div class="de-sub">Valor esperado para Junho/2026</div>
    ${isAdmin?`<div class="saldo-edit-row" id="saldo-edit-row">
      <input type="number" id="saldo-input" placeholder="Valor esperado..." value="${deveEntrar||''}">
      <button class="btn-salvar-saldo" onclick="salvarSaldo()">Salvar</button>
    </div>`:''}
  </div>`;

  // Gráfico
  h+=`<div class="chart-card">
    <h3>Situação dos pagamentos</h3>
    <div class="chart-wrap">
      <canvas id="pizzaCanvas" width="180" height="180" style="max-width:180px;max-height:180px"></canvas>
      <div class="chart-center"><div class="pct">${pct}%</div><div class="lbl">em dia</div></div>
    </div>
    <div class="chart-legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Em aberto (${nDev})</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--success)"></div>Em dia (${nOk})</div>
    </div>
  </div>`;

  // Em aberto
  h+=`<div class="list-card"><div class="list-card-title">Em aberto <span class="bc">${nDev}</span></div>`;
  estudantesBase.filter(e=>devedores.includes(e.matricula)).forEach(e=>{
    h+=`<div class="s-row" onclick="openDetail('${e.matricula}')">
      <div><div class="s-name">${e.nome}</div><div class="s-mat">#${e.matricula}</div></div>
      <div><div class="s-apagar">R$ ${fmt(e.apagar)}</div><div class="s-venc">Venc. ${e.limite.substring(0,5)}</div></div>
    </div>`;
  });
  h+=`</div>`;

  // Em dia
  h+=`<div class="list-card"><div class="list-card-title">Em dia <span class="bc green">${nOk}</span></div>`;
  estudantesBase.filter(e=>!devedores.includes(e.matricula)).forEach(e=>{
    h+=`<div class="s-row" onclick="openDetail('${e.matricula}')">
      <div><div class="s-name">${e.nome}</div><div class="s-mat">#${e.matricula}</div></div>
      <span class="badge-ok">Pago</span>
    </div>`;
  });
  h+=`</div>`;

  return h;
}

function initChart(){
  const canvas=document.getElementById('pizzaCanvas');
  if(!canvas)return;
  if(estudantesBase.length===0){
    return `<div class="empty-state" style="padding:3rem 1rem">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M9 17H7A5 5 0 0 1 7 7h2M15 7h2a5 5 0 0 1 0 10h-2M11 12h2"/></svg>
      <p style="margin-top:1rem;font-size:1rem;font-weight:600;color:var(--text2)">Nenhum dado carregado</p>
      <p style="margin-top:6px;font-size:0.85rem;color:var(--text3)">Acesse a aba <strong>Admin</strong> e faça o upload<br>do Relatório Base e do Relatório Mensal.</p>
    </div>`;
  }
  const total=estudantesBase.length;
  const nDev=devedores.length;
  const nOk=total-nDev;
  if(pizzaChart){pizzaChart.destroy();}
  pizzaChart=new Chart(canvas.getContext('2d'),{
    type:'doughnut',
    data:{datasets:[{data:[nDev,nOk],backgroundColor:['#c8102e','#1a7a4a'],borderWidth:0,hoverOffset:6}]},
    options:{cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:true}},animation:{animateRotate:true,duration:900}}
  });
}

function toggleEditSaldo(){
  const row=document.getElementById('saldo-edit-row');
  row.style.display=row.style.display==='flex'?'none':'flex';
}
async function salvarSaldo(){
  const val=parseFloat(document.getElementById('saldo-input').value);
  if(!isNaN(val)&&val>=0){
    deveEntrar=val;
    document.getElementById('saldo-display').textContent=`R$ ${fmt(val)}`;
    await sb.from('configuracoes').upsert({chave:'deve_entrar',valor:String(val)});
  }
  document.getElementById('saldo-edit-row').style.display='none';
}
function fmt(v){return v.toLocaleString('pt-BR',{minimumFractionDigits:2});}

// ALUNOS

function renderAlunos(){
  let h=`<div class="filter-bar">
    <input type="text" placeholder="Buscar por nome ou matrícula..." value="${searchQuery}" oninput="doSearch(this.value)">
  </div>
  <div class="filter-bar">
    <select onchange="doFilter(this.value)">
      <option value="todos" ${activeFilter==='todos'?'selected':''}>Todos</option>
      <option value="devendo" ${activeFilter==='devendo'?'selected':''}>Em aberto</option>
      <option value="em-dia" ${activeFilter==='em-dia'?'selected':''}>Em dia</option>
    </select>
  </div>`;

  const lista=estudantesBase.filter(e=>{
    const q=searchQuery.toLowerCase();
    const ok=!q||e.nome.toLowerCase().includes(q)||e.matricula.includes(q);
    const st=devedores.includes(e.matricula)?'devendo':'em-dia';
    return ok&&(activeFilter==='todos'||activeFilter===st);
  });

  if(!lista.length){h+=`<div class="empty-state">Nenhum aluno encontrado.</div>`;return h;}

  h+=`<div class="student-list">`;
  lista.forEach(e=>{
    const st=devedores.includes(e.matricula)?'devendo':'em-dia';
    const badgeLabel=st==='devendo'?'Em aberto':'Em dia';
    h+=`<div class="student-card ${st}" onclick="openDetail('${e.matricula}')">
      <div class="student-card-header">
        <div><div class="student-name">${e.nome}</div><div class="student-matricula">#${e.matricula}</div></div>
        <span class="badge ${st}">${badgeLabel}</span>
      </div>
      <div class="student-card-footer">
        <span class="student-info-sm">Venc. ${e.limite}</span>
        <span class="student-apagar-val">R$ ${fmt(e.apagar)}</span>
      </div>
    </div>`;
  });
  h+=`</div>`;
  return h;
}

function doSearch(q){searchQuery=q;document.getElementById('main-content').innerHTML=renderAlunos();}
function doFilter(v){activeFilter=v;document.getElementById('main-content').innerHTML=renderAlunos();}

async function loadNotes(matricula){
  try{
    const {data}=await sb.from('anotacoes').select('*').eq('matricula',matricula).order('created_at',{ascending:true});
    if(data&&data.length){
      anotacoes[matricula]=data.map(n=>({user:n.usuario,date:new Date(n.created_at).toLocaleDateString('pt-BR')+' '+new Date(n.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),text:n.texto}));
      const list=document.getElementById('notes-list');
      if(list){
        const notas=anotacoes[matricula].slice().reverse();
        list.innerHTML=notas.map(n=>`<div class="note-item"><div class="note-meta"><strong>${n.user}</strong><span>${n.date}</span></div><div class="note-text">${n.text}</div></div>`).join('');
      }
    }
  }catch(e){console.error(e);}
}

function closeDetail(){
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
}

async function addNote(matricula){
  const input=document.getElementById('note-input');
  const text=input.value.trim();
  if(!text)return;
  const btn=document.querySelector('.btn-add-note');
  btn.textContent='...';btn.disabled=true;
  try{
    const {data,error}=await sb.from('anotacoes').insert({matricula,texto:text,usuario:currentUser.displayName}).select();
    if(!error){
      if(!anotacoes[matricula])anotacoes[matricula]=[];
      const now=new Date();
      const date=now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      anotacoes[matricula].push({user:currentUser.displayName,date,text});
      input.value='';
      const notas=anotacoes[matricula].slice().reverse();
      document.getElementById('notes-list').innerHTML=notas.map(n=>`<div class="note-item"><div class="note-meta"><strong>${n.user}</strong><span>${n.date}</span></div><div class="note-text">${n.text}</div></div>`).join('');
    }
  }catch(e){console.error(e);}
  btn.textContent='Salvar';btn.disabled=false;
}

let selFiles={};
function handleFile(type,input){
  const f=input.files[0];if(!f)return;
  selFiles[type]=f;
  const key=type==='base'?'base':'month';
  document.getElementById(`${key}-file-name`).textContent=f.name;
  document.getElementById(`upload-${key}-area`).classList.add('has-file');
  document.getElementById(`btn-upload-${key}`).disabled=false;
}

function parseCSV(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const result=[];
  for(const line of lines){
    if(!line.trim())continue;
    const cols=[];
    let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.trim());
    result.push(cols);
  }
  return result;
}

function parseNum(s){
  if(!s||s==='-')return 0;
  s=s.replace(/"/g,'').trim();
  // Brazilian format: 1.395,00
  if(/\d\.\d{3},\d{2}/.test(s)) s=s.replace(/\./g,'').replace(',','.');
  else if(s.includes(',')&&!s.includes('.')) s=s.replace(',','.');
  return parseFloat(s.replace(/[^0-9.-]/g,''))||0;
}

function joinBrokenCols(rows){return rows;}

async function processUpload(type){
  const f=selFiles[type];if(!f)return;
  const key=type==='base'?'base':'month';
  const btn=document.getElementById(`btn-upload-${key}`);
  const el=document.getElementById(`status-${key}`);
  btn.disabled=true;btn.textContent='Processando...';

  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const text=e.target.result;
      const rows=parseCSV(text);
      // Find header row (has "Matrícula" or "Matricula")
      let headerIdx=rows.findIndex(r=>r[0]&&(r[0].toLowerCase().includes('matr')));
      if(headerIdx===-1)headerIdx=0;
      const dataRows=rows.slice(headerIdx+1).filter(r=>r[0]&&/^\d{5,}$/.test(r[0].trim()));
      const headerRow2=rows[headerIdx];

      if(type==='base'){
        // Auto-detect column positions from header
        const headerRow=headerRow2||rows[headerIdx];
        const colIdx={};
        headerRow.forEach((h,i)=>{
          const hn=h.toLowerCase().trim().replace(/[^a-záéíóúàâêôãõçü]/gi,'');
          if(hn.includes('matr'))colIdx.matricula=i;
          else if(hn.includes('nome'))colIdx.nome=i;
          else if(hn.includes('cur'))colIdx.curso=i;
          else if(hn.includes('per'))colIdx.periodo=i;
          else if(hn.includes('tur'))colIdx.turma=i;
          else if(hn.includes('parc'))colIdx.parcela=i;
          else if(hn.includes('lim'))colIdx.limite=i;
          else if(hn.includes('valor'))colIdx.valor=i;
          else if(hn.includes('desc'))colIdx.desc=i;
          else if(hn.includes('acr'))colIdx.acresc=i;
          else if(hn.includes('pag'))colIdx.apagar=i;
        });
        // Fallback to known positions if auto-detect fails
        const g=(r,k,fb)=>{const i=colIdx[k]!==undefined?colIdx[k]:fb;return r[i]?r[i].trim():'';};
        const gn=(r,k,fb)=>parseNum(g(r,k,fb));
        estudantesBase=dataRows.map(r=>({
          matricula:g(r,'matricula',0),
          nome:g(r,'nome',2),
          curso:g(r,'curso',3),
          periodo:g(r,'periodo',4),
          turma:g(r,'turma',6),
          parcela:g(r,'parcela',8),
          limite:g(r,'limite',9),
          valor:gn(r,'valor',11),
          desc:gn(r,'desc',13),
          acresc:gn(r,'acresc',14),
          apagar:gn(r,'apagar',15)
        }));
        // Remove duplicates by matricula (keep last)
        const seen={};
        estudantesBase=estudantesBase.filter(e=>{
          if(seen[e.matricula])return false;
          seen[e.matricula]=true;return true;
        });
        // Save to Supabase
        el.className='upload-status ok';
        el.textContent=`✓ Salvando ${estudantesBase.length} alunos no banco...`;
        try{
          // Delete old base and insert new
          await sb.from('alunos').delete().eq('tipo','base');
          const chunks=[];
          for(let i=0;i<estudantesBase.length;i+=50) chunks.push(estudantesBase.slice(i,i+50));
          for(const chunk of chunks){
            await sb.from('alunos').insert(chunk.map(e=>({
              matricula:e.matricula,nome:e.nome,curso:e.curso,periodo:e.periodo,
              turma:e.turma,parcela:e.parcela,limite:e.limite,valor:e.valor,
              desc_val:e.desc,acresc:e.acresc,apagar:e.apagar,tipo:'base'
            })));
          }
          el.textContent=`✓ Relatório base salvo! ${estudantesBase.length} alunos cadastrados.`;
        }catch(err){
          console.error(err);
          el.textContent=`✓ Carregado localmente (${estudantesBase.length} alunos). Erro ao salvar no banco.`;
        }
      } else {
        // Monthly: these are the debtors
        const mats=dataRows.map(r=>r[0].trim()).filter(Boolean);
        // Remove duplicates
        devedores=[...new Set(mats)];
        // Try to extract month from file content (line 2 or 3)
        const allLines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
        for(const line of allLines.slice(0,5)){
          const m=line.match(/(Janeiro|Fevereiro|Março|Abril|Maio|Junho|Julho|Agosto|Setembro|Outubro|Novembro|Dezembro)[/\s]*(\d{4})/i);
          if(m){mesReferencia=`${m[1].charAt(0).toUpperCase()+m[1].slice(1)} / ${m[2]}`;break;}
        }
        // Save devedores to Supabase
        el.className='upload-status ok';
        el.textContent=`✓ Salvando relatório mensal no banco...`;
        try{
          // Delete old devedores for this month and insert new
          if(mesReferencia) await sb.from('devedores_mes').delete().eq('mes_referencia',mesReferencia);
          if(devedores.length){
            await sb.from('devedores_mes').insert(devedores.map(m=>({
              matricula:m, mes_referencia:mesReferencia||''
            })));
          }
          el.textContent=`✓ Relatório mensal salvo! ${devedores.length} alunos em aberto${mesReferencia?' ('+mesReferencia+')':''}.`;
        }catch(err){
          console.error(err);
          el.textContent=`✓ Carregado localmente. Erro ao salvar no banco.`;
        }
      }
      // Refresh dashboard if active
      if(currentTab==='dashboard'){showTab('dashboard');}
      else if(currentTab==='alunos'){showTab('alunos');}
    }catch(err){
      el.className='upload-status err';
      el.textContent='Erro ao processar o arquivo. Verifique o formato CSV.';
      console.error(err);
    }
    btn.disabled=false;btn.textContent=type==='base'?'Processar Relatório Base':'Processar Relatório Mensal';
  };
  reader.readAsText(f,'latin-1');
}

function renderPerfil(){
  const mc=USERS[currentUser.username].mustChange;
  let h='';
  if(mc)h+=`<div class="change-pwd-banner"><p>⚠ Troque sua senha no primeiro acesso.</p><button class="btn-change-pwd" onclick="openModal()">Trocar agora</button></div>`;
  h+=`<div class="info-card"><h3>Meu perfil</h3>
    <div class="info-row"><span class="info-label">Usuário</span><span class="info-value">${currentUser.username}</span></div>
    <div class="info-row"><span class="info-label">Nome</span><span class="info-value">${currentUser.displayName}</span></div>
    <div class="info-row"><span class="info-label">Acesso</span><span class="info-value">${roleLabel(currentUser.role)}</span></div>
  </div>
  <button class="btn-primary" style="margin-top:1rem" onclick="openModal()">Trocar senha</button>
  <button class="logout-btn" onclick="doLogout()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    Sair da conta
  </button>`;
  return h;
}

function openModal(){document.getElementById('modal-pwd').classList.add('open');}
function closeModal(){document.getElementById('modal-pwd').classList.remove('open');}
async function saveNewPassword(){
  const p1=document.getElementById('new-pwd1').value;
  const p2=document.getElementById('new-pwd2').value;
  const err=document.getElementById('pwd-error');
  if(p1.length<6){err.style.display='block';err.textContent='Senha deve ter ao menos 6 caracteres.';return;}
  if(p1!==p2){err.style.display='block';err.textContent='As senhas não coincidem.';return;}
  try{
    await sb.from('usuarios').update({password:p1,must_change:false}).eq('username',currentUser.username);
    currentUser.mustChange=false;
    err.style.display='none';
    closeModal();
    document.getElementById('new-pwd1').value='';
    document.getElementById('new-pwd2').value='';
    showTab('perfil');
    alert('Senha alterada com sucesso!');
  }catch(e){err.style.display='block';err.textContent='Erro ao salvar. Tente novamente.';}
}
